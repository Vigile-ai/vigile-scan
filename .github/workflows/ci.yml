name: CLI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vigile-api for parity gate
        uses: actions/checkout@v4
        with:
          repository: Vigile-ai/vigile-api
          ref: main
          path: _counterpart/vigile-api

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run parity checker regression tests
        run: python3 scripts/tests/test_check_pattern_parity.py

      - name: Enforce CRITICAL/HIGH pattern parity gate
        run: |
          python3 scripts/check_pattern_parity.py \
            --self-repo cli \
            --self-root . \
            --counterpart-root _counterpart/vigile-api

      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Smoke test (verify CLI runs)
        run: node dist/index.js --version

      - name: Generate Evidence Pack
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/generate_evidence_pack.py --output EVIDENCE_PACK.md --strict

      - name: Upload Evidence Pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-pack-${{ github.run_id }}
          path: EVIDENCE_PACK.md
          if-no-files-found: error
