name: Release with Provenance

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Security audit
        run: npm run audit:check

      - name: Pack npm tarball
        id: pack
        run: |
          npm pack --json > pack.json
          TARBALL=$(node -e "const data=require('./pack.json'); process.stdout.write(data[0].filename)")
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Attest npm artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Publish to npm with provenance
        if: ${{ !contains(github.ref_name, '-dryrun') }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
